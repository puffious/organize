name: Release
run-name: release ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish assets for (example: v0.1.0)"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            os_name: linux
            arch_name: x86
            binary_name: organize
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            os_name: linux
            arch_name: arm64
            binary_name: organize
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch_name: x86
            binary_name: organize.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            os_name: windows
            arch_name: arm64
            binary_name: organize.exe
          - os: macos-14
            target: aarch64-apple-darwin
            os_name: darwin
            arch_name: arm64
            binary_name: organize

    runs-on: ${{ matrix.os }}

    steps:
      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross --locked

      - name: Build release binary (Linux via cross)
        if: runner.os == 'Linux'
        shell: bash
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary (non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          name="organize-${{ steps.vars.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          (cd dist && zip -q "../${name}.zip" "${{ matrix.binary_name }}")

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $name = "organize-${{ steps.vars.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch_name }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${name}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: '*.zip'

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found to upload"
            exit 1
          fi

          gh release upload "${{ steps.vars.outputs.tag }}" "${files[@]}" --clobber
