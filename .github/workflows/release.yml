name: Release
run-name: release ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  CONTAINER_PLATFORMS: linux/amd64,linux/arm64

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish assets for (example: v0.1.0)"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            os_name: linux
            arch_name: x86
            binary_name: organize
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            os_name: linux
            arch_name: arm64
            binary_name: organize
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch_name: x86
            binary_name: organize.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            os_name: windows
            arch_name: arm64
            binary_name: organize.exe
          - os: macos-14
            target: aarch64-apple-darwin
            os_name: darwin
            arch_name: arm64
            binary_name: organize

    runs-on: ${{ matrix.os }}

    steps:
      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross --locked

      - name: Build release binary (Linux via cross)
        if: runner.os == 'Linux'
        shell: bash
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary (non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          name="organize-${{ steps.vars.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          (cd dist && zip -q "../${name}.zip" "${{ matrix.binary_name }}")

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $name = "organize-${{ steps.vars.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch_name }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${name}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: '*.zip'

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          lower_repo="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${lower_repo}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found to upload"
            exit 1
          fi

          gh release upload "${{ steps.vars.outputs.tag }}" "${files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"

      - name: Check out source for container build
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=${{ steps.vars.outputs.version }}

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ env.CONTAINER_PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload publish summary
        shell: bash
        run: |
          {
            echo "## Container image"
            echo
            echo "- Registry: \`${{ env.REGISTRY }}\`"
            echo "- Image: \`${{ steps.vars.outputs.image }}\`"
            echo "- Platforms: \`${{ env.CONTAINER_PLATFORMS }}\`"
            echo "- Tags:"
            printf '%s\n' "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
              [[ -n "$tag" ]] && echo "  - \`$tag\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Append container image link to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          current_notes="$(gh release view "${{ steps.vars.outputs.tag }}" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body')"
          container_block=$(cat <<'EOF'

          ## Container image

          - Pull: `${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}`
          - Platforms: `${{ env.CONTAINER_PLATFORMS }}`
          EOF
          )
          if [[ "$current_notes" == *"## Container image"* ]]; then
            echo "Release notes already mention container image"
            exit 0
          fi
          gh release edit "${{ steps.vars.outputs.tag }}" \
            --notes "${current_notes}${container_block}" \
            --repo "${GITHUB_REPOSITORY}"
